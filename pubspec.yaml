name: bag_factory_app
description: 购物袋工厂生产管理系统 - 内部管理APP
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  shared_preferences: ^2.2.0

  # 状态管理
  flutter_riverpod: ^2.5.1

  # 路由
  go_router: ^14.2.0

  # 图表
  fl_chart: ^0.68.0

  # 拍照/图片
  image_picker: ^1.1.0

  # 工具
  intl: ^0.19.0
  cross_file: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true


